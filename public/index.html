<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1 MILLION CheckBoxes</title>
    <style>
        :root {
            --bg: #0f172a;
            --panel: #111827;
            --text: #e5e7eb;
            --muted: #94a3b8;
            --accent: #14b8a6;
            --accent-soft: #2dd4bf;
            --border: #1f2937;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
            background: radial-gradient(circle at top, #1e293b 0%, var(--bg) 45%);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        h1 {
            margin: 0 0 18px;
            font-size: clamp(1.5rem, 2vw + 1rem, 2.4rem);
            letter-spacing: 0.5px;
            color: #f8fafc;
        }

        #container {
            width: min(700px, 100%);
            background: color-mix(in srgb, var(--panel) 85%, black);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(28px, 1fr));
            gap: 10px;
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.35);
        }

        input[type="checkbox"] {
            appearance: none;
            width: 22px;
            height: 22px;
            margin: 0 auto;
            border: 2px solid #475569;
            border-radius: 6px;
            background: #0b1220;
            cursor: pointer;
            transition: transform 0.12s ease, border-color 0.2s ease, background-color 0.2s ease;
        }

        input[type="checkbox"]:hover {
            transform: translateY(-1px);
            border-color: var(--accent-soft);
        }

        input[type="checkbox"]:checked {
            background: var(--accent);
            border-color: var(--accent);
        }

        input[type="checkbox"]:focus-visible {
            outline: 2px solid #f8fafc;
            outline-offset: 2px;
        }

        p{
            margin-bottom: 50px;
        }
    </style>
</head>
<body>
    <h1>CheckBoxes</h1>
    <p class="p">A tiny Playground of clickable squares. Tick away. </p>
    <div id="container">

    </div>

    <script>
        const container = document.getElementById("container");
        const CHECKBOX_COUNT = 100;

        new Array(CHECKBOX_COUNT).fill(null).forEach((_ , index)=>{
            const input = document.createElement("input");
            input.type = "checkbox";
            container.appendChild(input);
        })
    </script>
    
</body>
</html>
